<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='visualizations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='map.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  </head>
  <body>
    <div class="centered">
      <div class="main-container">
        <div class="left-container">
          <div class="title-container">
            <div class="inputs-title">Respiratory Hospitalization Visualizations Tool</div>
            <button type="button" class="btn btn-outline-primary" onclick="window.location.href='/'">
              Prediction Tool
            </button>
          </div>
          <div class="inputs-sub-title">View historical respiratory hospitalizations and model predictions</div>
          <form>
            <div id="map-container" class="mb-3">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <div id="selected-display">No state selected</div>
              </div>
              <svg id="map-svg" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
        
            <input type="hidden" name="state" id="state-input" value="">
          </form>
          <div class="dropdown-container">
            <div class="input-container">
              <label>Model:</label>
              <select name="model" class="form-select">
                <option value="pred_rf">Random Forest</option>
                <option value="pred_lr">Linear Regression</option>
              </select>
            </div>
            <div class="input-container">
              <label>AQI Metric:</label>
              <select name="aqi_metric" class="form-select">
                <option value="aqi_mean">aqi_mean</option>
                <option value="aqi_p90">aqi_p90</option>
                <option value="aqi_max">aqi_max</option>
              </select>
            </div>
          </div>
          <div>
            <button type="button" class="btn btn-primary w-100 mb-2" onclick="loadCharts()">
              Visualize Data
            </button>
          </div>
        </div>
        <div class="right-container">
          <div class="charts-grid">
            <img id="chart-actual" class="chart-img">
            <img id="chart-scatter" class="chart-img">
            <img id="chart-aqi" class="chart-img">
            <img id="chart-importance" class="chart-img">
          </div>
          <div class="loader" id="loader" style="display:none;">
            <div class="block-loader">
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
              <div class="block"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const width = 960;
      const height = 600;
    
      const svg = d3.select("#map-svg")
        .attr("viewBox", `0 0 ${width} ${height}`);
    
      const projection = d3.geoAlbersUsa()
        .scale(1280)
        .translate([width / 2, height / 2]);
    
      const path = d3.geoPath().projection(projection);
    
      const stateNames = {
        "01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA",
        "08":"CO","09":"CT","10":"DE","12":"FL","13":"GA",
        "15":"HI","16":"ID","17":"IL","18":"IN","19":"IA",
        "20":"KS","21":"KY","22":"LA","23":"ME","24":"MD",
        "25":"MA","26":"MI","27":"MN","28":"MS","29":"MO",
        "30":"MT","31":"NE","32":"NV","33":"NH","34":"NJ",
        "35":"NM","36":"NY","37":"NC","38":"ND","39":"OH",
        "40":"OK","41":"OR","42":"PA","44":"RI","45":"SC",
        "46":"SD","47":"TN","48":"TX","49":"UT","50":"VT",
        "51":"VA","53":"WA","54":"WV","55":"WI","56":"WY"
      };
    
      let selectedState = null;
    
      d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us => {
        const states = topojson.feature(us, us.objects.states);
    
        svg.selectAll("path")
          .data(states.features)
          .join("path")
            .attr("class", "state-path")
            .attr("d", path)
            .attr("data-state", d => stateNames[d.id] || "")
            .on("click", function(event, d) {
              const name = stateNames[d.id];
              if (!name) return;
    
              svg.selectAll(".state-path").classed("selected", false);
              d3.select(this).classed("selected", true);
    
              selectedState = name;
              document.getElementById("state-input").value = name;
              document.getElementById("selected-display").innerHTML = `Selected: <span>${name}</span>`;

              console.log(selectedState);
            });
      });

      async function loadCharts() {
        const response = await fetch('/charts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              state: selectedState,
              model: document.querySelector('[name="model"]').value,
              aqi_metric: document.querySelector('[name="aqi_metric"]').value,              
            })
        });

        const result = await response.json();

        console.log(result);

        if (result.error) {
            console.error('Chart error:', result.error);
            return;
        }

        document.getElementById('chart-actual').src = `data:image/png;base64,${result.actual_vs_predicted}`;
        document.getElementById('chart-scatter').src = `data:image/png;base64,${result.scatter}`;
        document.getElementById('chart-aqi').src = `data:image/png;base64,${result.aqi_over_time}`;
        document.getElementById('chart-importance').src = `data:image/png;base64,${result.feature_importance}`;
      }
      
    </script>
  </body>
</html>
